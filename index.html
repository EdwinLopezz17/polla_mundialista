<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polla · Ingresar</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-wrap">
    <form class="login-card panel" id="loginForm" autocomplete="off">
      <h1>Polla de pronósticos</h1>

      <div id="msg" class="msg" hidden></div>

      <div class="field">
        <label for="userSelect">Usuario</label>
        <select id="userSelect" required>
          <option value="">Cargando usuarios…</option>
        </select>
      </div>

      <div class="field">
        <label for="pinInput">PIN</label>
        <input type="password" id="pinInput" inputmode="numeric" required>
      </div>

      <button type="submit" class="primary" id="btnLogin">Ingresar</button>
    </form>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
